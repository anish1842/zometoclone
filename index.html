<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zomato Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hero Section -->
  <header class="hero">
    <div class="overlay">
      <h1>Zomato Clone</h1>
      <p>Discover the best food & drinks in your city</p>
      <div class="search-bar">
        <input type="text" placeholder="Search for restaurant, cuisine or dish">
        <button>Search</button>
      </div>
    </div>
  </header>

  <!-- Categories -->
  <section class="categories">
    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Dining">
      <h3>Dining Out</h3>
      <p>Explore curated lists of top restaurants.</p>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Delivery">
      <h3>Delivery</h3>
      <p>Order food from your favorite places.</p>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Nightlife">
      <h3>Nightlife</h3>
      <p>Discover the best bars & clubs.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>Made with ❤️ for learning purposes | Zomato Clone</p>
  </footer>
</body>
</html>
